name: Deploy back

# Manual deploy from any branch: Actions → this workflow → Run workflow → Branch dropdown.
# This workflow file must exist on the default branch to appear in the Actions UI.

on:
  workflow_dispatch:
    inputs:
      stands_csv:
        description: "Aliases from repo Variable DEPLOY_STANDS_JSON (comma-separated)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      component: back
      stands_csv: ${{ inputs.stands_csv }}
    secrets: inherit
