name: Deploy front

# Manual deploy from any branch: Actions → this workflow → Run workflow → Branch dropdown
# («Use workflow from»). Server receives github.ref_name (see deploy-reusable).
# GitHub shows workflow_dispatch only if this file exists on the repository default branch.

on:
  workflow_dispatch:
    inputs:
      stands_csv:
        description: "Aliases from repo Variable DEPLOY_STANDS_JSON (comma-separated)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      component: front
      stands_csv: ${{ inputs.stands_csv }}
    secrets: inherit
